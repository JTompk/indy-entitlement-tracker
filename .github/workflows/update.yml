name: Weekly filings update

on:
  schedule:
    # Every Monday at 11:00 UTC = 6:00 AM Eastern (7:00 AM during EDT it's 7am; adjust if you care)
    - cron: "0 11 * * 1"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        run: |
          python scraper/scrape.py
          python scraper/arcgis_pull.py
          python scraper/digest.py

      - name: Commit updated data
        run: |
          git config user.name "filings-bot"
          git config user.email "actions@github.com"
          git add docs/data/ data/ digest_drafts/ || true
          git diff --cached --quiet && echo "No new filings this week." && exit 0
          git commit -m "Weekly update: $(date -u +%Y-%m-%d)"
          git push
