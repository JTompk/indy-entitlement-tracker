name: Publish digest to IndyIMBY

on:
  schedule:
    - cron: "0 17 * * 1"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tracker
        uses: actions/checkout@v4
        with:
          path: tracker

      - name: Check out IndyIMBY site
        uses: actions/checkout@v4
        with:
          repository: JTompk/indyimby-site
          token: ${{ secrets.SITE_PUSH_TOKEN }}
          path: site

      - name: Copy today's digest into the site
        id: copy
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          SRC="tracker/digest_drafts/${TODAY}-this-week.md"
          DEST="site/content/posts/${TODAY}-this-week.md"
          if [ ! -f "$SRC" ]; then
            echo "No digest draft for $TODAY - nothing to publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ -f "$DEST" ]; then
            echo "Digest already published - skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          cp "$SRC" "$DEST"
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Commit to site repo
        if: steps.copy.outputs.publish == 'true'
        run: |
          cd site
          git config user.name "digest-bot"
          git config user.email "actions@github.com"
          git add content/posts/
          git commit -m "Monday digest: $(date -u +%Y-%m-%d)"
          git push
